version: '3.8'

services:
  mysql-db:
    image: mysql:8
    container_name: mysql-duoc
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: myuser
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - duoc-network

  backend:
    build: ./Backend
    container_name: backend-duoc
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/mydatabase
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - duoc-network

  frontend:
    build: ./Frontend
    container_name: frontend-duoc
    ports:
      - "8082:8082"
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend
    networks:
      - duoc-network

networks:
  duoc-network:
    driver: bridge